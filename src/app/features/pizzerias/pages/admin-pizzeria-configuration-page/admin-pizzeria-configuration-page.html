@if (pizzeriaResource.isLoading()) {
  <div class="loading-center" aria-label="Loading pizzeria settings"><rw-spinner /></div>
} @else if (pizzeriaResource.error()) {
  <rw-callout variant="error" message="Could not load pizzeria settings. Please try again." />
} @else {
  @let pizzeria = pizzeriaResource.value()!;
  <div class="admin-form-wrap admin-form-wrap--centered">
    @if (pizzeriaForm().errors()[0]; as err) {
      <rw-callout variant="error" [message]="err.message!" />
    }
    @if (submitSuccess()) {
      <rw-callout variant="success" message="Your changes have been saved." />
    }

    <form [formRoot]="pizzeriaForm" class="admin-form">
      <div class="admin-readonly-field">
        <label for="pizzeria-name" class="admin-readonly-field__label">Name</label>
        <input
          id="pizzeria-name"
          class="admin-readonly-field__input"
          [value]="pizzeria.name"
          disabled
        />
        <span class="admin-readonly-field__hint">Auto-generated, not editable</span>
      </div>

      <rw-photon-location-field [formField]="pizzeriaForm.location" />

      <rw-image-picker
        category="pizzeria"
        label="Pizzeria image"
        [formField]="pizzeriaForm.image"
      />

      <div class="form-actions">
        <rw-button type="submit" [isLoading]="pizzeriaForm().submitting()">
          Save changes
        </rw-button>
      </div>

      <div class="danger-zone" aria-label="Danger zone">
        <rw-callout
          variant="error"
          message="Danger zone: deleting this pizzeria permanently removes it and cannot be undone."
        >
          <rw-button
            type="button"
            palette="danger"
            [isLoading]="isDeleting()"
            (click)="deletePizzeria()"
          >
            Delete pizzeria
          </rw-button>
        </rw-callout>
      </div>
    </form>
  </div>
}
