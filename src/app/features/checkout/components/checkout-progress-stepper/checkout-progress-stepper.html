@switch (status()) {
  @case ('error') {
    <img ngSrc="/icons/error.svg" alt="" width="20" height="20" />
  }
  @case ('success') {
    <img ngSrc="/icons/check.svg" alt="" width="20" height="20" />
  }
  @default {
    <span class="checkout-step__number">{{ order() }}</span>
  }
}
<span>{{ label() }}</span>
