<td class="admin-table__cell-primary">{{ order().createdAt | date: 'dd MMM, HH:mm' }}</td>
<td class="admin-table__cell-muted">{{ order().items.length }} pizza(s)</td>
<td class="admin-table__cell-muted">€{{ order().total | number: '1.2-2' }}</td>
<td><rw-status-badge [status]="order().status" /></td>
<td class="admin-table__actions">
  <span class="admin-table__actions-inline">
    @if (order().status !== 'CANCELLED' && order().status !== 'DELIVERED') {
      <button
        type="button"
        class="admin-action-link admin-icon-action"
        aria-label="Mark order as delivered"
        (click)="promptDeliverOrder()"
      >
        <img ngSrc="/icons/delivery.svg" alt="" width="20" height="20" aria-hidden="true" />
      </button>
    }
    @if (order().status === 'PENDING') {
      <button
        type="button"
        class="admin-action-delete admin-icon-action"
        aria-label="Cancel pending order"
        (click)="promptCancelOrder()"
      >
        <img ngSrc="/icons/cancel.svg" alt="" width="20" height="20" aria-hidden="true" />
      </button>
    }
  </span>
</td>
