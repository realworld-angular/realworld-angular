<div
  class="field"
  tabindex="0"
  [class.field--error]="touched() && invalid()"
  (keydown)="containerKeydown($event)"
>
  <label class="field__label">
    {{ label() }}
    @if (required()) {
      <span class="field__required" aria-hidden="true">*</span>
    }
    <div class="photon-location__wrap">
      <input
      type="text"
      class="field__input"
      [value]="query()"
      (input)="queryInput($event)"
      (focus)="focusField()"
      (blur)="blurField()"
      [disabled]="disabled()"
      [readonly]="readonly()"
      placeholder="Start typing a city or place…"
      autocomplete="off"
      role="combobox"
      [attr.aria-expanded]="isOpen()"
      aria-controls="listboxId"
    />
    @if (isOpen() && (isLoading() || suggestions().length > 0)) {
      <ul
        id="listboxId"
        class="photon-location__suggestions"
        aria-label="Location suggestions"
      >
        @if (isLoading()) {
          <li class="photon-location__hint" role="presentation">Searching…</li>
        } @else {
          @for (suggestion of suggestions(); track $index; let idx = $index) {
            <li
              [id]="'option-' + idx"
              [class.photon-location__option--active]="idx === activeIndex()"
              class="photon-location__option"
              (mousedown)="selectSuggestion($event, suggestion)"
            >
              {{ suggestion.label }}
            </li>
          }
        }
      </ul>
    }
  </div>
  </label>
  @if (touched() && invalid()) {
    <span class="field__error" role="alert">{{ errors()[0].message }}</span>
  }
</div>
