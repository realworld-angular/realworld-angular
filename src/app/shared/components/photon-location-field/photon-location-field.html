<div class="field" [class.field--error]="touched() && invalid()">
  <label class="field__label" [attr.for]="inputId">
    {{ label() }}
    @if (required()) {
      <span class="field__required" aria-hidden="true">*</span>
    }
  </label>

  <div class="photon-location__wrap" (focusout)="onWrapFocusOut($event)">
    <input
      [id]="inputId"
      type="text"
      class="field__input"
      [value]="displayText()"
      (input)="onInput($event)"
      (focus)="onFocus()"
      (keydown)="onKeydown($event)"
      [disabled]="disabled()"
      [readonly]="readonly()"
      placeholder="Start typing a city or place…"
      autocomplete="off"
      role="combobox"
      [attr.aria-expanded]="showPanel()"
      [attr.aria-controls]="showPanel() ? listboxId : null"
    />

    @if (showPanel()) {
      <ul [id]="listboxId" class="photon-location__suggestions" aria-label="Location suggestions">
        @if (isLoading()) {
          <li class="photon-location__hint" role="presentation">Searching…</li>
        } @else {
          @for (suggestion of suggestions(); track suggestion.label; let idx = $index) {
            <li
              class="photon-location__option"
              [class.photon-location__option--active]="idx === activeIndex()"
              (mousedown)="selectSuggestion($event, suggestion)"
            >
              {{ suggestion.label }}
            </li>
          }
        }
      </ul>
    }
  </div>

  @if (touched() && invalid()) {
    <span class="field__error" role="alert">{{ errors()[0].message }}</span>
  }
</div>
