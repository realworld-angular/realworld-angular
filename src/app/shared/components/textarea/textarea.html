<div class="field" [class.field--error]="field()?.touched() && field()?.errors()?.length">
  <label class="field__label">
    @if (label()) {
      {{ label() }}
      @if (isRequired()) {
        <span class="field__required" aria-hidden="true">*</span>
      }
    }
    <textarea
      [placeholder]="placeholder()"
      [rows]="rows()"
      [formField]="formField()"
      [attr.aria-describedby]="(field()?.touched() && field()?.errors()?.length) ? errorId : hint() ? hintId : null"
      class="field__textarea"
    ></textarea>
  </label>
  @if (maxLength()) {
    <span class="field__counter" aria-live="polite">
      {{ charCount() }}/{{ maxLength() }}
    </span>
  }
  @if (hint() && !(field()?.touched() && field()?.errors()?.length)) {
    <span [id]="hintId" class="field__hint">{{ hint() }}</span>
  }
  @if (field()?.touched() && field()?.errors()?.length) {
    <span [id]="errorId" class="field__error" role="alert">
      {{ field()!.errors()[0].message }}
    </span>
  }
</div>
